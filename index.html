<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>城巴實時到站 · Citybus Live ETA</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0f1117; --card:#1a1f2e; --border:#2d3748;
      --text:#e2e8f0; --muted:#718096; --accent:#f6ad55;
      --accent2:#ed8936; --green:#68d391; --red:#fc8181;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg); color:var(--text); min-height:100vh;
      -webkit-text-size-adjust:100%;
    }
    header{
      background:linear-gradient(135deg,#1a1f2e,#16213e);
      border-bottom:1px solid var(--border); padding:12px 16px;
      display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:100;
    }
    .bus-icon{
      width:40px; height:40px; background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px;
    }
    .container{max-width:780px; margin:0 auto; padding:14px 12px;}
    
    /* Search & Controls */
    .controls{
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:12px; margin-bottom:14px;
    }
    .search-row{ display:flex; gap:8px; }
    input[type="text"], select{
      background:var(--bg); border:1px solid var(--border); border-radius:8px;
      color:var(--text); padding:10px; font-size:0.9rem; width:100%; outline:none;
    }
    input[type="text"]:focus, select:focus{ border-color:var(--accent); }
    
    .btn-clear{
      background:var(--border); color:var(--text); border:none; 
      padding:0 15px; border-radius:8px; cursor:pointer; font-size:0.8rem; white-space:nowrap;
    }
    button.primary{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#1a1f2e; border:none; border-radius:8px; padding:12px; font-weight:700; width:100%;
      cursor:pointer; transition: transform 0.1s;
    }
    button.primary:active{ transform: scale(0.98); }

    /* Stop Cards */
    .stop-list{display:flex; flex-direction:column; gap:8px;}
    .stop-card{ background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .stop-header{ display:flex; align-items:center; gap:12px; padding:14px; cursor:pointer; }
    .stop-seq{ 
        width:28px; height:28px; border-radius:50%; background:#2d3748; 
        display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:bold;
    }
    .stop-names{ flex:1; }
    .stop-names .zh{ font-weight:700; font-size:0.95rem; }
    .stop-names .en{ font-size:0.75rem; color:var(--muted); margin-top:2px; }

    /* ETA Panel */
    .eta-panel{ border-top:1px solid var(--border); padding:12px; display:none; background:#161b27; }
    .eta-row{ 
        display:flex; justify-content:space-between; align-items:center;
